title = "Gitleaks Production Config"

[extend]
# Extend default Gitleaks ruleset
useDefault = true

# =========================================================
# GLOBAL ALLOWLIST
# =========================================================
[allowlist]
description = "Global allowlist for common false positives"

regexes = [
  '''(?i)example''',
  '''(?i)test''',
  '''(?i)dummy''',
  '''(?i)sample''',
  '''(?i)changeme'''
]

paths = [
  '''go\.sum''',
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''pnpm-lock\.yaml''',
  '''\.git/''',
  '''dist/''',
  '''build/'''
]

# =========================================================
# CUSTOM RULES
# =========================================================

# ---------------------------------------------------------
# Generic API Key / Secret
# ---------------------------------------------------------
[[rules]]
id = "generic-api-key"
description = "Generic API key or secret"
regex = '''(?i)(api[_-]?key|secret|token|access[_-]?token)[\s:=]+['"]?[A-Za-z0-9_\-]{16,}['"]?'''
entropy = 3.5
tags = ["key", "generic"]

# ---------------------------------------------------------
# Private Keys
# ---------------------------------------------------------
[[rules]]
id = "private-key"
description = "Private key detected"
regex = '''-----BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY-----'''
tags = ["key", "private"]

# ---------------------------------------------------------
# AWS Access Key
# ---------------------------------------------------------
[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

# ---------------------------------------------------------
# AWS Secret Key
# ---------------------------------------------------------
[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
regex = '''(?i)aws(.{0,20})?(secret|access)[^A-Za-z0-9]{0,5}[A-Za-z0-9\/+=]{40}'''
entropy = 4.0
tags = ["aws", "secret"]

# ---------------------------------------------------------
# GitHub Token
# ---------------------------------------------------------
[[rules]]
id = "github-token"
description = "GitHub token"
regex = '''gh[pousr]_[A-Za-z0-9]{36,255}'''
tags = ["github", "token"]

# ---------------------------------------------------------
# Slack Token
# ---------------------------------------------------------
[[rules]]
id = "slack-token"
description = "Slack token"
regex = '''xox[baprs]-[A-Za-z0-9\-]{10,48}'''
tags = ["slack", "token"]

# ---------------------------------------------------------
# JWT Token
# ---------------------------------------------------------
[[rules]]
id = "jwt-token"
description = "JWT token"
regex = '''eyJ[A-Za-z0-9_-]+?\.[A-Za-z0-9._-]+?\.[A-Za-z0-9_-]+'''
tags = ["jwt", "token"]

# ---------------------------------------------------------
# Hardcoded Password (with allowlist FIXED)
# ---------------------------------------------------------
[[rules]]
id = "hardcoded-password"
description = "Hardcoded password"
regex = '''(?i)(password|passwd|pwd)[\s:=]+['"]?.{6,}['"]?'''
entropy = 3.0
tags = ["password"]

  [rules.allowlist]
  description = "Ignore obvious non-sensitive password placeholders"
  regexes = [
    '''(?i)password\s*[:=]\s*["']?(password|123456|admin)["']?'''
  ]

# =========================================================
# GLOBAL ENTROPY SETTINGS
# =========================================================
[entropy]
min = 3.0