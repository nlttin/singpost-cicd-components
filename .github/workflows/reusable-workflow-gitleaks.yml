name: Gitleaks Scan (Reusable)

on:
  workflow_call:
    inputs:
      config-path:
        description: "Optional custom Gitleaks config file path"
        required: false
        type: string

      scan_mode:
        description: "Scan mode: pr (diff) or full (entire repo)"
        required: false
        type: string
        default: "pr"

      base-ref:
        description: "Fallback base branch if PR context is not available"
        required: false
        type: string
        default: "origin/main"

      fail-on-detection:
        description: "Fail pipeline if secrets detected"
        required: false
        type: boolean
        default: true

      config-ref:
        description: "Branch or tag of central config"
        required: false
        type: string
        default: "main"
    
    secrets:
      GITLEAKS_LICENSE:
        required: false
      PAT_TOKEN:
        required: false

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      # Checkout caller repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Download central config (only if no local config)
      - name: Download central Gitleaks config
        if: ${{ !hashFiles('.gitleaks.toml') && !hashFiles('.github/config/.gitleaks.toml') }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "No PAT_TOKEN → skip central config"
            exit 0
          fi

          echo "Downloading config from central repo..."

          curl -sSL --fail --connect-timeout 10 \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/nlttin/singpost-cicd-components/contents/.github/config/.gitleaks.toml?ref=${{ inputs.config-ref }}" \
            -o gitleaks-central.toml

          if [ ! -s gitleaks-central.toml ]; then
            echo "ERROR: Download failed or empty"
            exit 2
          fi

          echo "Downloaded central config"

      # Validate scan_mode (fail fast)
      - name: Validate inputs
        shell: bash
        run: |
          if [[ "${{ inputs.scan_mode }}" != "pr" && "${{ inputs.scan_mode }}" != "full" ]]; then
            echo "Invalid scan_mode: ${{ inputs.scan_mode }}"
            exit 2
          fi

      # Resolve config priority:
      # 1. Input config-path
      # 2. Caller repo .gitleaks.toml
      # 3. Reusable default config
      - name: Resolve config
        id: config
        shell: bash
        run: |
          if [ -n "${{ inputs.config-path }}" ]; then
            if [ -f "${{ inputs.config-path }}" ]; then
              CONFIG="${{ inputs.config-path }}"
              echo "Using input config: $CONFIG"
            else
              echo "ERROR: Provided config-path not found"
              exit 2
            fi

          elif [ -f ".gitleaks.toml" ]; then
            CONFIG=".gitleaks.toml"
            echo "Using repo root config"

          elif [ -f ".github/config/.gitleaks.toml" ]; then
            CONFIG=".github/config/.gitleaks.toml"
            echo "Using repo config (.github/config)"

          elif [ -f "gitleaks-central.toml" ]; then
            CONFIG="gitleaks-central.toml"
            echo "Using central downloaded config"

            if [ ! -s gitleaks-central.toml ]; then
              echo "ERROR: Empty config file"
              exit 2
            fi

            if grep -q "Not Found" gitleaks-central.toml; then
              echo "ERROR: Invalid response from GitHub API"
              exit 2
            fi

          else
            CONFIG=""
            echo "No config found, using gitleaks built-in rules"
          fi

          echo "Resolved config: ${CONFIG:-<built-in>}"
          echo "config=$CONFIG" >> $GITHUB_OUTPUT

      
      # Auto-detect base-ref for PR
      # Fallback to input if not PR
      - name: Detect base ref
        id: baseref
        shell: bash
        run: |
          if [ "${{ inputs.scan_mode }}" = "pr" ]; then
            if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
              BASE="origin/${{ github.event.pull_request.base.ref }}"
              echo "Detected PR base branch: $BASE"
            else
              BASE="${{ inputs.base-ref }}"
              echo "Fallback base branch: $BASE"
            fi
          else
            BASE=""
          fi

          echo "base_ref=$BASE" >> $GITHUB_OUTPUT

          if [ -n "$BASE" ]; then
            git fetch origin ${BASE#origin/} --depth=1 || true
          fi

      # Detect baseline file
      - name: Detect baseline
        id: baseline
        shell: bash
        run: |
          if [ -f ".gitleaks-baseline.json" ]; then
            echo "baseline=--baseline-path .gitleaks-baseline.json" >> $GITHUB_OUTPUT
          else
            echo "baseline=" >> $GITHUB_OUTPUT
          fi

      # Install pinned Gitleaks version
      - name: Install Gitleaks
        shell: bash
        run: |
          VERSION="v8.30.1"
          echo "Downloading Gitleaks ${VERSION}..."
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz -o gitleaks.tar.gz
          echo "Extracting..."
          tar -xzf gitleaks.tar.gz

          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

          echo "Verifying installation..."
          gitleaks version
          
      # Run scan with controlled exit handling
      - name: Run Gitleaks
        id: scan
        continue-on-error: true
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        shell: bash
        run: |
          if [ -n "${{ steps.config.outputs.config }}" ]; then
            CONFIG_ARG="--config=${{ steps.config.outputs.config }}"
          else
            CONFIG_ARG=""
          fi

          if [ "${{ inputs.scan_mode }}" = "pr" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              LOG_OPTS="--log-opts=${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
            elif [ "${{ github.event_name }}" = "push" ]; then
              LOG_OPTS="--log-opts=${{ github.event.before }}..${{ github.sha }}"
            else
              LOG_OPTS="--log-opts=${{ steps.baseref.outputs.base_ref }}..HEAD"
            fi
          else
            LOG_OPTS=""
          fi

          set +e
          gitleaks detect \
            $CONFIG_ARG \
            $LOG_OPTS \
            ${{ steps.baseline.outputs.baseline }} \
            --redact \
            --verbose \
            --report-format sarif \
            --report-path gitleaks-report.sarif
          status=$?

          echo "scan_status=$status" >> $GITHUB_OUTPUT

          if [ "$status" -eq 0 ]; then
            echo "leaks=false" >> $GITHUB_OUTPUT
          elif [ "$status" -eq 1 ]; then
            echo "leaks=true" >> $GITHUB_OUTPUT
          else
            echo "leaks=error" >> $GITHUB_OUTPUT
          fi

          if [ -f "gitleaks-report.sarif" ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi

      # Upload SARIF (only if exists)
      - name: Upload SARIF
        if: |
          always() &&
          steps.scan.outputs.report_exists == 'true' &&
          github.event_name == 'push'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

      # Upload artifact
      - name: Upload report
        if: always() && steps.scan.outputs.report_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 30

      # Fail if leaks detected (controlled)
      - name: Fail if leaks found
        if: steps.scan.outputs.leaks == 'true' && inputs.fail-on-detection == true
        run: exit 1

      # Fail if execution error
      - name: Fail on execution error
        if: steps.scan.outputs.leaks == 'error'
        run: exit 1