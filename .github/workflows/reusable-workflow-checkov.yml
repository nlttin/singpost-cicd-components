name: Checkov Scan

on:
  workflow_call:
    inputs:
      config-path:
        required: false
        type: string
      PROJECTID:
        required: false
        type: string
      cache-folder:
        required: false
        type: string
      environment:
        required: false
        type: string

jobs:
  checkov-scan:
    permissions:
      contents: read
      security-events: write
      actions: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Checkov GitHub Action
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        continue-on-error: true
        with:
          directory: .
          output_format: cli,sarif
          output_file_path: console,results.sarif
          config_file: ${{ inputs.config-path }}

      - name: Publish Step Summary
        if: always()
        run: |
          {
            echo "## Checkov Security Scan Results"
            echo ""
            if [ ! -f results.sarif ]; then
              echo "⚠️ No results file generated"
              exit 0
            fi

            FAILED=$(python3 -c "import json; d=json.load(open('results.sarif')); print(len(d['runs'][0]['results']))")

            if [ "$FAILED" -eq "0" ]; then
              echo "✅ **All checks passed**"
            else
              echo "❌ **$FAILED issue(s) found**"
              echo ""
              echo "| Rule ID | Severity | File | Line |"
              echo "|---------|----------|------|------|"
              python3 - <<'PYEOF'
          import json

          with open('results.sarif') as f:
              d = json.load(f)

          runs = d.get('runs', [{}])[0]
          results = runs.get('results', [])
          rules = {r['id']: r for r in runs.get('tool', {}).get('driver', {}).get('rules', [])}

          for r in results[:25]:
              rule_id = r.get('ruleId', '?')
              severity = rules.get(rule_id, {}).get('properties', {}).get('severity', 'MEDIUM')
              locs = r.get('locations', [{}])
              loc = locs[0].get('physicalLocation', {}) if locs else {}
              uri = loc.get('artifactLocation', {}).get('uri', '?')
              line = loc.get('region', {}).get('startLine', '?')
              print(f'| `{rule_id}` | {severity} | `{uri}` | {line} |')

          if len(results) > 25:
              print(f'| ... | | *+{len(results) - 25} more* | |')
          PYEOF
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

      - name: Fail if scan found issues
        if: steps.checkov.outcome == 'failure'
        run: |
          echo "::error::Checkov scan failed — see Step Summary and Security tab for details"
          exit 1
