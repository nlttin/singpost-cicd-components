name: Reusable - Docker Build

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Image name (e.g. singpost-app-ingestion)'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context'
        required: false
        type: string
        default: '.'
      push:
        description: 'Push image to GAR (requires GAR secrets to be configured)'
        required: false
        type: boolean
        default: false
      registry:
        description: 'GAR registry URL (e.g. asia-southeast1-docker.pkg.dev/project/repo)'
        required: false
        type: string
        default: ''
    secrets:
      WIF_PROVIDER:
        required: false
      WIF_SERVICE_ACCOUNT:
        required: false
    outputs:
      image-tag:
        description: 'Full image tag built'
        value: ${{ jobs.docker-build.outputs.image-tag }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.docker-build.outputs.digest }}

jobs:
  docker-build:
    name: Docker Build (${{ inputs.image-name }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry != '' && format('{0}/{1}', inputs.registry, inputs.image-name) || inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Authenticate to GCP (Workload Identity)
        if: inputs.push == true
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for GAR
        if: inputs.push == true
        run: |
          REGISTRY="${{ inputs.registry }}"
          REGISTRY_HOST="${REGISTRY%%/*}"
          REGISTRY_HOST="${REGISTRY_HOST:-asia-southeast1-docker.pkg.dev}"
          gcloud auth configure-docker "$REGISTRY_HOST" --quiet

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "============================================"
          echo "  DOCKER BUILD SUMMARY"
          echo "  Image   : ${{ inputs.image-name }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Tags    :"
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/    /'
          echo "  Digest  : ${{ steps.build.outputs.digest || 'N/A (not pushed)' }}"
          echo "  Pushed  : ${{ inputs.push == true && secrets.WIF_PROVIDER != '' }}"
          echo "============================================"