name: Reusable - CodeQL Analysis

on:
  workflow_call:
    inputs:
      language:
        description: 'Language to analyze (javascript-typescript, python, java, go, etc.)'
        required: false
        type: string
        default: 'javascript-typescript'
      build-mode:
        description: 'Build mode: none (interpreted), autobuild (compiled), manual'
        required: false
        type: string
        default: 'none'
      queries:
        description: 'Query suite: security-extended, security-and-quality, etc.'
        required: false
        type: string
        default: 'security-extended'
      fail-on-severity:
        description: 'Fail pipeline if High/Critical found: error=block on high/critical, warning=block on medium+, none=report only'
        required: false
        type: string
        default: 'none'
      max-medium:
        description: 'Max allowed Medium findings before failing (0 = disabled)'
        required: false
        type: number
        default: 0

jobs:
  codeql:
    name: CodeQL (${{ inputs.language }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.language }}
          build-mode: ${{ inputs.build-mode }}
          queries: ${{ inputs.queries }}

      - name: Autobuild
        if: inputs.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ inputs.language }}
          output: sarif-results
          upload: always

      - name: Validate CodeQL Findings
        env:
          SEVERITY_OVERRIDE: ${{ inputs.fail-on-severity }}
          MAX_MEDIUM: ${{ inputs.max-medium }}
          BRANCH: ${{ github.ref_name }}
        run: |
          SARIF_FILE=$(find sarif-results -name "*.sarif" | head -n 1)
          [ -z "$SARIF_FILE" ] && echo "No SARIF report found" && exit 1

          if [ "$SEVERITY_OVERRIDE" != "none" ] && [ -n "$SEVERITY_OVERRIDE" ]; then
            POLICY="$SEVERITY_OVERRIDE"
          elif [ "$BRANCH" == "main" ]; then
            POLICY="error"
          else
            POLICY="warn"
          fi

          # CodeQL stores rules in extensions[], not driver.rules[] — combine both
          SEV_MAP=$(jq '
            [(.runs[0].tool.driver.rules // []),
             (.runs[0].tool.extensions // [] | map(.rules // []) | add // [])]
            | add // []
            | map({key: .id, value: (.properties["security-severity"] // "0" | try tonumber catch 0)})
            | from_entries
          ' "$SARIF_FILE")

          CRITICAL_COUNT=$(jq --argjson s "$SEV_MAP" '[.runs[0].results[] | select(($s[.ruleId]//0) >= 9.0)] | length' "$SARIF_FILE")
          HIGH_COUNT=$(jq --argjson s "$SEV_MAP" '[.runs[0].results[] | . as $r | select(($s[$r.ruleId]//0) >= 7.0 and ($s[$r.ruleId]//0) < 9.0)] | length' "$SARIF_FILE")
          MEDIUM_COUNT=$(jq --argjson s "$SEV_MAP" '[.runs[0].results[] | . as $r | select(($s[$r.ruleId]//0) >= 4.0 and ($s[$r.ruleId]//0) < 7.0)] | length' "$SARIF_FILE")
          HC_COUNT=$((CRITICAL_COUNT + HIGH_COUNT))

          echo "Branch: $BRANCH | Policy: $POLICY | Critical: $CRITICAL_COUNT | High: $HIGH_COUNT | Medium: $MEDIUM_COUNT"

          if [ "$HC_COUNT" -gt 0 ]; then
            echo "--- HIGH / CRITICAL FINDINGS ($HC_COUNT) ---"
            jq -r --argjson s "$SEV_MAP" '
              .runs[0].results[] | . as $r |
              ($s[$r.ruleId]//0) as $cvss | select($cvss >= 7.0) |
              (if $cvss >= 9.0 then "CRITICAL" else "HIGH" end) as $label |
              ($r.locations[0].physicalLocation.artifactLocation.uri // "unknown") as $file |
              ($r.locations[0].physicalLocation.region.startLine // 1) as $line |
              ($r.message.text // "no message") as $msg |
              "  Severity : \($label) (CVSS \($cvss))\n  Rule     : \($r.ruleId // "unknown")\n  File     : \($file)\n  Line     : \($line)\n  Message  : \($msg)\n  ----------------------------------------------------------",
              "::error file=\($file),line=\($line)::[\($label) CVSS:\($cvss)] \($r.ruleId // "unknown"): \($msg)"
            ' "$SARIF_FILE"
          fi

          if [ "$POLICY" == "error" ] && [ "$HC_COUNT" -gt 0 ]; then
            echo "::error::SECURITY GATE FAILED: $HC_COUNT High/Critical findings on '$BRANCH'. Fix before merging to main."
            exit 1
          elif [ "$HC_COUNT" -gt 0 ]; then
            echo "::warning::SECURITY ADVISORY: $HC_COUNT High/Critical findings on '$BRANCH'. Review before merging to main."
          else
            echo "Security gate passed."
          fi

          if [ "$MAX_MEDIUM" -gt 0 ] && [ "$MEDIUM_COUNT" -gt "$MAX_MEDIUM" ]; then
            echo "::error::MEDIUM THRESHOLD EXCEEDED: $MEDIUM_COUNT findings exceed limit of $MAX_MEDIUM."
            exit 1
          fi
