name: Reusable - CodeQL Analysis

on:
  workflow_call:
    inputs:
      language:
        description: 'Language to analyze (javascript-typescript, python, java, go, etc.)'
        required: false
        type: string
        default: 'javascript-typescript'
      build-mode:
        description: 'Build mode: none (interpreted), autobuild (compiled), manual'
        required: false
        type: string
        default: 'none'
      queries:
        description: 'Query suite: security-extended, security-and-quality, etc.'
        required: false
        type: string
        default: 'security-extended'
      fail-on-severity:
        description: 'Fail pipeline if High/Critical found: error=block on high/critical, warning=block on medium+, none=report only'
        required: false
        type: string
        default: 'none'
      max-medium:
        description: 'Max allowed Medium findings before failing (0 = disabled)'
        required: false
        type: number
        default: 0

jobs:
  codeql:
    name: CodeQL (${{ inputs.language }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}
          build-mode: ${{ inputs.build-mode }}
          queries: ${{ inputs.queries }}

      - name: Autobuild
        if: inputs.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ inputs.language }}
          output: sarif-results
          upload: always

      - name: Validate CodeQL Findings
        if: inputs.fail-on-severity != 'none'
        env:
          SEVERITY: ${{ inputs.fail-on-severity }}
          MAX_MEDIUM: ${{ inputs.max-medium }}
        run: |
          SARIF_FILE=$(find sarif-results -name "*.sarif" | head -n 1)

          if [ -z "$SARIF_FILE" ]; then
            echo "No SARIF report found"
            exit 1
          fi

          echo "===== CODEQL FINDINGS ====="
          jq -r '
            .runs[].results[] |
            {
              severity: (.properties.securitySeverityLevel // .level // "unknown"),
              rule: .ruleId,
              file: .locations[0].physicalLocation.artifactLocation.uri,
              line: .locations[0].physicalLocation.region.startLine,
              message: .message.text
            }
          ' "$SARIF_FILE"

          echo ""
          echo "===== SEVERITY SUMMARY ====="
          jq -r '
            .runs[].results[]
            | (.properties.securitySeverityLevel // .level // "unknown")
          ' "$SARIF_FILE" | tr '[:upper:]' '[:lower:]' | sort | uniq -c

          HIGH_COUNT=$(jq '[
            .runs[].results[]
            | select(
                (.properties.securitySeverityLevel // .level // "")
                | ascii_downcase
                | test("high|critical")
              )
          ] | length' "$SARIF_FILE")

          MEDIUM_COUNT=$(jq '[
            .runs[].results[]
            | select(
                (.properties.securitySeverityLevel // .level // "")
                | ascii_downcase
                == "medium"
              )
          ] | length' "$SARIF_FILE")

          echo ""
          echo "===== POLICY RESULT ====="
          echo "High/Critical findings : $HIGH_COUNT"
          echo "Medium findings        : $MEDIUM_COUNT"
          echo "Fail-on-severity       : $SEVERITY"
          echo "Medium threshold       : $MAX_MEDIUM"

          if [ "$SEVERITY" == "error" ] && [ "$HIGH_COUNT" -gt 0 ]; then
            echo ""
            echo "::error::Blocking pipeline: $HIGH_COUNT High/Critical vulnerabilities detected."
            exit 1
          fi

          if [ "$SEVERITY" == "warning" ]; then
            TOTAL=$((HIGH_COUNT + MEDIUM_COUNT))
            if [ "$TOTAL" -gt 0 ]; then
              echo ""
              echo "::error::Blocking pipeline: $TOTAL Medium/High/Critical vulnerabilities detected."
              exit 1
            fi
          fi

          if [ "$MAX_MEDIUM" -gt 0 ] && [ "$MEDIUM_COUNT" -gt "$MAX_MEDIUM" ]; then
            echo ""
            echo "::error::Blocking pipeline: Medium findings ($MEDIUM_COUNT) exceed threshold ($MAX_MEDIUM)."
            exit 1
          fi

          echo ""
          echo "Security gate passed."
