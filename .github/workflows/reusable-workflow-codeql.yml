name: Reusable - CodeQL Analysis

on:
  workflow_call:
    inputs:
      language:
        description: 'Language to analyze (javascript-typescript, python, java, go, etc.)'
        required: false
        type: string
        default: 'javascript-typescript'
      build-mode:
        description: 'Build mode: none (interpreted), autobuild (compiled), manual'
        required: false
        type: string
        default: 'none'
      queries:
        description: 'Query suite: security-extended, security-and-quality, etc.'
        required: false
        type: string
        default: 'security-extended'
      fail-on-severity:
        description: 'Fail pipeline if alerts found at this level or above: error, warning, note, none'
        required: false
        type: string
        default: 'none'

jobs:
  codeql:
    name: CodeQL (${{ inputs.language }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}
          build-mode: ${{ inputs.build-mode }}
          queries: ${{ inputs.queries }}

      - name: Autobuild
        if: inputs.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ inputs.language }}
          output: sarif-results
          upload: always

      - name: Fail pipeline on severity threshold
        if: inputs.fail-on-severity != 'none'
        run: |
          SEVERITY="${{ inputs.fail-on-severity }}"
          SARIF_FILE=$(ls sarif-results/*.sarif | head -1)

          if [ "$SEVERITY" == "error" ]; then
            COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' "$SARIF_FILE")
          elif [ "$SEVERITY" == "warning" ]; then
            COUNT=$(jq '[.runs[].results[] | select(.level == "error" or .level == "warning")] | length' "$SARIF_FILE")
          elif [ "$SEVERITY" == "note" ]; then
            COUNT=$(jq '[.runs[].results[]] | length' "$SARIF_FILE")
          else
            COUNT=0
          fi

          if [ "$COUNT" -gt 0 ]; then
            echo "::error::CodeQL found $COUNT alert(s) at severity '$SEVERITY' or above. Pipeline failed."
            exit 1
          fi
          echo "CodeQL check passed — no alerts at severity '$SEVERITY' or above."
